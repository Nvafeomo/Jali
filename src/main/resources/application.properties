# Server
server.port=8080

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/jali
spring.datasource.username=jali_user
spring.datasource.password=jali_pass
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Neo4j
spring.neo4j.uri=neo4j+s://REDACTED.databases.neo4j.io
spring.neo4j.authentication.username=REDACTED
spring.neo4j.authentication.password=REDACTED

# Logging
logging.level.org.springframework=INFO
logging.level.com.jali=DEBUG