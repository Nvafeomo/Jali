# Server — Render sets PORT automatically; falls back to 8080 locally
server.port=${PORT:8080}

# CORS — set CORS_ALLOWED_ORIGINS to your production frontend URL on deploy
# e.g. CORS_ALLOWED_ORIGINS=https://jali.app,https://www.jali.app
jali.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:3000}

# Local overrides (Neo4j Aura credentials, etc.) — not committed
spring.config.import=optional:classpath:application-local.properties

# PostgreSQL
# Locally: Docker Compose maps host 5433 -> container 5432
# Production: set DB_URL as a full JDBC URL, e.g. jdbc:postgresql://host:5432/jali
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/jali}
spring.datasource.username=${DB_USERNAME:jali_user}
spring.datasource.password=${DB_PASSWORD:jali_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${JPA_SHOW_SQL:false}

# Neo4j — set in application-local.properties (see application-local.properties.example)
spring.neo4j.uri=${NEO4J_URI:}
spring.neo4j.authentication.username=${NEO4J_USERNAME:}
spring.neo4j.authentication.password=${NEO4J_PASSWORD:}
spring.data.neo4j.database=${NEO4J_DATABASE:neo4j}

# Logging
logging.level.org.springframework=INFO
logging.level.com.jali=DEBUG

# JWT (override with JWT_SECRET env var in production)
jwt.secret=${JWT_SECRET:jali-secret-key-must-be-at-least-32-characters-long}
jwt.expiration=${JWT_EXPIRATION_MS:86400000}

# Dev sample graph in Neo4j (see MandinkaSampleGraphSeeder); enable in application-local.properties
jali.graph.seed.enabled=false

spring.data.neo4j.repositories.type=imperative

spring.jpa.open-in-view=false

# GraphQL / GraphiQL — disable in production (GRAPHIQL_ENABLED=false)
spring.graphql.graphiql.enabled=${GRAPHIQL_ENABLED:true}
spring.graphql.graphiql.path=/graphiql

# Voice memo audio uploads
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=25MB

# OpenAI / Anthropic — set in application-local.properties or via env vars
openai.api.key=${OPENAI_API_KEY:}
anthropic.api.key=${ANTHROPIC_API_KEY:}

# Resend (transactional email)
# Get your API key at https://resend.com → API Keys
# Set RESEND_API_KEY on Render (or in application-local.properties locally)
# Without it, emails are skipped and logged as warnings
resend.api.key=${RESEND_API_KEY:}

# Email sender address — must be a verified domain on Resend in production
# For local testing without a domain, use onboarding@resend.dev (can only send to account owner email)
jali.email.from=${JALI_EMAIL_FROM:onboarding@resend.dev}

# Frontend base URL — used to build links in emails
jali.app.base-url=${JALI_APP_BASE_URL:http://localhost:5173}