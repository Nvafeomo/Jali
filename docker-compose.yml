services:
  postgres:
    image: postgres:16
    container_name: jali-postgres
    environment:
      POSTGRES_DB: jali
      POSTGRES_USER: jali_user
      POSTGRES_PASSWORD: jali_pass
    ports:
      # Host 5433 avoids conflict with a local Windows PostgreSQL on 5432
      - "5433:5432"
    volumes:
      - jali-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jali_user -d jali"]
      interval: 5s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5
    container_name: jali-neo4j
    environment:
      NEO4J_AUTH: neo4j/jali_neo4j_pass
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"   # Neo4j browser UI
      - "7687:7687"   # Bolt protocol (what Spring Boot connects to)
    volumes:
      - jali-neo4j-data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  jali-postgres-data:
  jali-neo4j-data:
