services:
  postgres:
    image: postgres:16
    container_name: jali-postgres
    environment:
      POSTGRES_DB: jali
      POSTGRES_USER: jali_user
      POSTGRES_PASSWORD: jali_pass
    ports:
      # Host 5433 avoids conflict with a local Windows PostgreSQL on 5432
      - "5433:5432"
    volumes:
      - jali-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jali_user -d jali"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  jali-postgres-data:
